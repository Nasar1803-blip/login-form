<!doctype html>
<html>
  <head>
    <title>Profile</title>
  </head>
  <body>
    <h1>👤 User Profile</h1>

    <hr />

    <h3>Username : {{ request.user.username }}</h3>

    <h3>Email : {{ request.user.email }}</h3>

    <h3>Date Joined : {{ request.user.date_joined|date:"d M Y" }}</h3>

    <h3>Last Login : {{ request.user.last_login|date:"d M Y h:i A" }}</h3>

    <br />

    <a href="/dashboard/">⬅ Dashboard</a>

    <a href="/edit-profile/" class="btn">✏️ Edit Profile</a>

    <a href="/logout/">Logout</a>
  </body>
</html>
